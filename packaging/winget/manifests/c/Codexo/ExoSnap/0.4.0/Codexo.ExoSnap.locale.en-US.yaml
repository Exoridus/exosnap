ShortDescription: Windows-native screen / application / region recorder with an NVIDIA NVENC pipeline, multi-track audio, and diagnostics.
Description: >-
  ExoSnap is a Windows-native screen / application / region recorder built around a
  high-performance NVIDIA NVENC pipeline, flexible container/codec profiles, multi-track
  audio routing, a webcam overlay, and built-in diagnostics. It captures an application
  window, a monitor, or a screen region at CFR 60 fps, records to MKV, WebM, or MP4, and
  blocks invalid recordings before start. ExoSnap 0.4.0 adds local-first crash capture with a
  privacy-scrubbed, consent-gated next-launch report (assisted GitHub issue or opt-in Sentry upload
  with EU data residency) and an update check with Stable and Preview channels (signed manifest:
  ed25519 + SHA-256; notify and open releases page, no silent restart). Requires an NVIDIA GPU with
  supported NVENC.
