name: Release Candidate

on:
  workflow_dispatch:

# This workflow produces the canonical release artifacts (portable ZIP + MSI)
# from a single Release build and install tree. It does NOT create a git tag,
# a GitHub Release, change repository visibility, or publish to WinGet.

jobs:
  build:
    name: Build Release Artifacts
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          archives: 'qtbase qtsvg'
          cache: true

      - name: Install WiX Toolset
        run: dotnet tool install --global wix
        shell: pwsh

      - name: Accept WiX EULA
        run: wix eula accept wix7
        shell: pwsh

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # Crashpad + mini_chromium nest extremely deep under FetchContent; the
      # default build-tree path blows past Windows MAX_PATH (260). Long-path
      # support is mandatory for the official (crash-capture ON) build to succeed.
      - name: Enable git long paths
        run: git config --global core.longpaths true

      # Cache the fetched + built sentry-native/Crashpad tree (official build only)
      # so reruns do not re-clone and re-build the whole dependency. Keyed on the
      # pinned sentry-native version AND scoped to the Visual Studio generator.
      #
      # The cache MUST be generator-scoped: this job configures C:/es with the
      # "Visual Studio 17 2022" generator (preset windows-x64-release), while
      # crash-capture-build.yml configures the same C:/es path with `-G Ninja`.
      # A shared key let a Ninja-configured FetchContent subbuild (googletest)
      # leak into this VS configure, and CMake aborts with "generator: Visual
      # Studio 17 2022 does not match the generator used previously: Ninja".
      # The `-vs2022-` namespace keeps the two generators' caches from crossing.
      - name: Cache FetchContent deps (sentry-native + Crashpad)
        uses: actions/cache@v4
        with:
          path: C:/es
          key: es-fetchcontent-${{ runner.os }}-vs2022-${{ hashFiles('cmake/VendorSentry.cmake') }}
          restore-keys: |
            es-fetchcontent-${{ runner.os }}-vs2022-

      # Pre-configure the Release tree with EXOSNAP_RELEASE_PDB=ON so the linker
      # emits a separate exosnap.pdb the symbol-archiving step can collect. The
      # release script is then invoked with -SkipConfigure so it builds + packages
      # against this already-configured tree (its build dir is build/windows-x64-
      # release, matching this preset). The .pdb stays in the build tree; the
      # install/ZIP/MSI never ship it (install deploys RUNTIME only).
      #
      # Official build: when the EXOSNAP_UPDATE_PUBLIC_KEY_HEX repo VARIABLE is set,
      # this enables the full 0.4.0 feature set — crash capture (out-of-process
      # Crashpad + the Sentry Stage-1 DSN, gated on EXOSNAP_OFFICIAL_BUILD) and
      # runtime update checking (IsUpdateCheckEnabled() returns true only for
      # official builds). The embedded public key is required by the CMake gate and
      # used by the (currently dormant) signed-manifest verification. If the variable
      # is absent the workflow still produces an UNOFFICIAL build (no DSN, update
      # checking disabled) so the artifact pipeline never hard-fails on a fresh fork.
      - name: Configure Release tree
        shell: pwsh
        env:
          PUBKEY: ${{ vars.EXOSNAP_UPDATE_PUBLIC_KEY_HEX }}
        run: |
          $cfgArgs = @('--preset', 'windows-x64-release', '-DEXOSNAP_RELEASE_PDB=ON')
          if ($env:PUBKEY) {
            Write-Host "Official build: crash capture (Sentry DSN) + update checking ENABLED."
            $cfgArgs += @(
              '-DEXOSNAP_ENABLE_CRASH_CAPTURE=ON',
              '-DEXOSNAP_OFFICIAL_BUILD=ON',
              "-DEXOSNAP_UPDATE_PUBLIC_KEY_HEX=$($env:PUBKEY)",
              '-DFETCHCONTENT_BASE_DIR=C:/es'
            )
          } else {
            Write-Host "::warning::EXOSNAP_UPDATE_PUBLIC_KEY_HEX repo variable not set — building UNOFFICIAL (no Sentry DSN, update checking disabled at runtime)."
          }
          cmake @cfgArgs

      - name: Build canonical release artifacts
        run: pwsh -NonInteractive -File scripts/build-release-artifacts.ps1 -SkipConfigure -SkipSmoke
        shell: pwsh

      # Archive the Release PDBs for offline symbolication of crash minidumps
      # (ADR 0017 § Symbol pipeline). Keyed by version + run id so a given build's
      # symbols are uniquely retrievable. This is the local/offline path; it does
      # NOT push symbols to a crash service.
      #
      # TODO(Crash-C): once a Sentry auth token is provisioned, add a step that
      # runs `sentry-cli debug-files upload --org <org> --project exosnap <pdbs>`
      # (and the matching crashpad_handler.pdb) so uploaded minidumps symbolicate
      # server-side. Deferred per ADR 0017 — needs a CI secret (auth token).
      - name: Collect Release PDBs
        id: pdbs
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(\s*exosnap\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)').Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $stage = Join-Path $env:RUNNER_TEMP "exosnap-pdbs"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $found = Get-ChildItem -Path build/windows-x64-release -Recurse -Filter *.pdb -File -ErrorAction SilentlyContinue
          foreach ($p in $found) { Copy-Item -LiteralPath $p.FullName -Destination $stage -Force }
          $count = (Get-ChildItem -Path $stage -Filter *.pdb -File).Count
          Write-Host "Collected $count PDB file(s) into $stage"
          if ($count -eq 0) {
            Write-Host "::warning::No PDB files were found in the Release build tree. Symbol archiving will be empty."
          }
          "dir=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Upload Release PDBs (symbol archive)
        uses: actions/upload-artifact@v4
        with:
          name: ExoSnap-${{ steps.pdbs.outputs.version }}-windows-x64-pdb-${{ github.run_id }}
          path: ${{ steps.pdbs.outputs.dir }}/*.pdb
          if-no-files-found: warn

      - name: Resolve artifact paths
        id: artifact
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(\s*exosnap\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)').Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "dir=.workspace/release/$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Upload all release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64
          path: |
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64-portable.zip
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64-portable.sha256
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64.msi
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64.msi.sha256
            ${{ steps.artifact.outputs.dir }}/artifact-manifest.json
            ${{ steps.artifact.outputs.dir }}/validation-report.md
          if-no-files-found: error
