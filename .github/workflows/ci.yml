name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          modules: 'qtsvg'
          cache: true

      - name: Install cppcheck
        run: choco install cppcheck -y

      - name: Check clang-format
        run: pwsh -NonInteractive -File scripts/check-format.ps1

      - name: Configure (lint preset)
        run: cmake --preset windows-x64-lint

      - name: Build with static analysis
        run: cmake --build --preset windows-x64-lint

  build-test:
    name: build-test (${{ matrix.preset }})
    runs-on: windows-latest
    strategy:
      matrix:
        preset:
          - windows-x64-debug
          - windows-x64-release
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          modules: 'qtsvg'
          cache: true

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test logs (${{ matrix.preset }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/Temporary/

      - name: Install and deploy (release only)
        if: matrix.preset == 'windows-x64-release'
        run: |
          # Qt's deploy support requires an absolute install prefix.
          cmake --install build/windows-x64-release --config Release --prefix "${{ github.workspace }}/build/install/exosnap"
        shell: pwsh

      - name: Validate release artifact (release only)
        if: matrix.preset == 'windows-x64-release'
        run: |
          $installDir = "build/install/exosnap"
          $errors = @()

          # Root files (flat portable layout: exe + Qt runtime + docs at root)
          @("LICENSE", "THIRD_PARTY_NOTICES.md", "KNOWN_LIMITATIONS.md", "README-PORTABLE.md",
            "exosnap.exe", "qt.conf", "Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll") | ForEach-Object {
            if (-not (Test-Path "$installDir/$_")) { $errors += "Missing root file: $_" }
          }
          if (-not (Test-Path "$installDir/plugins/platforms")) { $errors += "Missing plugins/platforms" }

          # License directory and files
          if (-not (Test-Path "$installDir/licenses")) {
            $errors += "Missing licenses/ directory"
          } else {
            @(
              "spdlog.txt", "nlohmann_json.txt", "tomlplusplus.txt",
              "opus.txt", "fdk-aac.txt", "libebml.txt",
              "libmatroska.txt", "qt.txt"
            ) | ForEach-Object {
              if (-not (Test-Path "$installDir/licenses/$_")) { $errors += "Missing license: $_" }
            }
          }

          # Absence checks — development files must NOT leak into the runtime tree
          @("include", "lib") | ForEach-Object {
            if (Test-Path "$installDir/$_") { $errors += "Dev directory leaked: $_/" }
          }

          # No .lib, .h, .hpp, .cpp, .cmake, .pc files
          $forbiddenExts = @("*.lib", "*.h", "*.hpp", "*.cpp", "*.cmake", "*.pc")
          $forbiddenExts | ForEach-Object {
            $found = Get-ChildItem -Path $installDir -Recurse -Filter $_ -ErrorAction SilentlyContinue
            if ($found) { $errors += "Forbidden file type leaked: $_" }
          }

          # No .workspace or .claude paths
          if (Test-Path "$installDir/.workspace") { $errors += ".workspace leaked into install tree" }
          if (Test-Path "$installDir/.claude")   { $errors += ".claude leaked into install tree" }

          if ($errors.Count -gt 0) {
            Write-Host "##[error] License bundle validation FAILED:"
            $errors | ForEach-Object { Write-Host "##[error]   $_" }
            exit 1
          }
          Write-Host "License bundle validation PASSED"
        shell: pwsh

      - name: Upload release artifact
        if: matrix.preset == 'windows-x64-release'
        uses: actions/upload-artifact@v4
        with:
          name: exosnap-release
          path: build/install/exosnap/

  # Canonical portable release candidate. Manual trigger only — this builds the
  # exact ExoSnap-<version>-windows-x64.zip payload and its SHA-256 sidecar and
  # uploads them as a workflow artifact. It does NOT create a git tag, a GitHub
  # Release, or change repository visibility; publication remains a separate,
  # explicitly approved step.
  release-candidate:
    name: release-candidate
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          modules: 'qtsvg'
          cache: true

      - name: Build canonical portable artifact
        # The script configures + builds Release, installs via CMake (the sole
        # packaging authority), validates the tree, and produces the ZIP, the
        # SHA-256 sidecar, a manifest, and a report under .workspace/. Smoke is
        # skipped here (headless runner); it is exercised in local validation.
        run: pwsh -NonInteractive -File scripts/build-release-artifact.ps1 -SkipSmoke
        shell: pwsh

      - name: Resolve artifact paths
        id: artifact
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(\s*exosnap\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)').Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "dir=.workspace/release/$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Upload portable release candidate
        uses: actions/upload-artifact@v4
        with:
          name: ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64
          path: |
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64.zip
            ${{ steps.artifact.outputs.dir }}/ExoSnap-${{ steps.artifact.outputs.version }}-windows-x64.sha256
          if-no-files-found: error
          if-no-files-found: ignore
