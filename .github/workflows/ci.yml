name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: build-test (${{ matrix.preset }})
    runs-on: windows-latest
    strategy:
      matrix:
        preset:
          - windows-x64-debug
          - windows-x64-release
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Windows App SDK tooling
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Write-Host "VS path: $vsPath"
          $componentId = "Microsoft.VisualStudio.ComponentGroup.WindowsAppSDK.Cpp"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          & $vsInstaller modify --installPath $vsPath --add $componentId --quiet --norestart --wait
          if ($LASTEXITCODE -ne 0) {
            Write-Host "vs_installer returned $LASTEXITCODE — tooling may already be present"
          }

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test logs (${{ matrix.preset }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/Temporary/
