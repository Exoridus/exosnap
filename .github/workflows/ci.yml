name: CI

on:
  # Run on the default branch and release tags directly, and on every pull
  # request. Feature branches are covered by their PR, so a plain branch push
  # no longer triggers a second, redundant run alongside the pull_request run.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          archives: 'qtbase qtsvg'
          cache: true

      - name: Install cppcheck
        run: |
          choco install cppcheck -y
          # choco PATH edits do not propagate to later steps in the same job;
          # expose cppcheck.exe to the configure step explicitly.
          "$env:ProgramFiles\Cppcheck" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Check clang-format
        run: pwsh -NonInteractive -File scripts/check-format.ps1

      - name: Validate WinGet manifest
        run: pwsh -NonInteractive -File scripts/validate-winget-manifest.ps1

      - name: Configure (lint preset)
        run: cmake --preset windows-x64-lint

      - name: Build with static analysis
        run: cmake --build --preset windows-x64-lint

  build-test:
    name: build-test (${{ matrix.preset }})
    runs-on: windows-2022
    strategy:
      matrix:
        preset:
          - windows-x64-debug
          - windows-x64-release
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          archives: 'qtbase qtsvg'
          cache: true

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test logs (${{ matrix.preset }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/Temporary/
