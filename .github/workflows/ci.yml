name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          archives: 'qtbase qtsvg'
          cache: true

      - name: Install cppcheck
        run: choco install cppcheck -y

      - name: Check clang-format
        run: pwsh -NonInteractive -File scripts/check-format.ps1

      - name: Configure (lint preset)
        run: cmake --preset windows-x64-lint

      - name: Build with static analysis
        run: cmake --build --preset windows-x64-lint

  build-test:
    name: build-test (${{ matrix.preset }})
    runs-on: windows-2022
    strategy:
      matrix:
        preset:
          - windows-x64-debug
          - windows-x64-release
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          arch: 'win64_msvc2022_64'
          archives: 'qtbase qtsvg'
          cache: true

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test logs (${{ matrix.preset }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/Temporary/
